<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var fonts={'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap','Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap','Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap','ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap','Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'};var chosen=localStorage.getItem('dhanu-font')||'Nunito';if(fonts[chosen]){var l=document.createElement('link');l.rel='stylesheet';l.href=fonts[chosen];document.head.appendChild(l);}document.documentElement.style.setProperty('--app-font',chosen);})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Sorting & Matching</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--app-font, 'Nunito'), sans-serif;
    background: linear-gradient(135deg, #ff9f1c, #e65100);
    min-height: 100vh;
  }
  .topbar {
    background: rgba(0,0,0,0.25);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar a {
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
  }
  .topbar span {
    color: #fff;
    font-size: 20px;
    font-weight: 800;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 16px 12px 8px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: rgba(255,255,255,0.25);
    border: 3px solid rgba(255,255,255,0.5);
    color: #fff;
    font-size: 17px;
    font-weight: 800;
    padding: 10px 22px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #fff;
    color: #e65100;
    border-color: #fff;
    transform: scale(1.05);
  }

  /* Game area */
  .game-area {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 10px 20px;
    margin-bottom: 14px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
  }

  /* Item display */
  .item-card {
    background: #fff;
    border-radius: 28px;
    padding: 28px 20px 20px;
    text-align: center;
    margin-bottom: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    position: relative;
  }
  .item-emoji {
    font-size: 96px;
    line-height: 1.1;
    display: block;
  }
  .item-label {
    font-size: 26px;
    font-weight: 800;
    color: #333;
    margin-top: 8px;
  }
  .question-text {
    font-size: 18px;
    color: #888;
    margin-top: 4px;
    font-weight: 600;
  }
  .feedback-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .feedback-overlay.show-correct {
    background: rgba(0,200,100,0.18);
    opacity: 1;
  }
  .feedback-overlay.show-wrong {
    background: rgba(255,60,60,0.18);
    opacity: 1;
  }

  /* Bins */
  .bins {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .bin {
    flex: 1;
    min-width: 130px;
    max-width: 200px;
    background: rgba(255,255,255,0.22);
    border: 4px solid rgba(255,255,255,0.6);
    border-radius: 24px;
    padding: 18px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .bin:hover, .bin:active {
    transform: scale(1.06);
    background: rgba(255,255,255,0.4);
  }
  .bin-icon {
    font-size: 44px;
    display: block;
  }
  .bin-label {
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    margin-top: 6px;
  }
  .bin.flash-correct {
    background: rgba(0,220,100,0.55);
    border-color: #00dc64;
    animation: flashCorrect 0.5s ease;
  }
  .bin.flash-wrong {
    animation: shakeWrong 0.5s ease;
    background: rgba(255,60,60,0.4);
    border-color: #ff3c3c;
  }
  @keyframes flashCorrect {
    0%   { transform: scale(1.0); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1.0); }
  }
  @keyframes shakeWrong {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }

  /* Score screen */
  .score-screen {
    display: none;
    background: #fff;
    border-radius: 28px;
    padding: 36px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    margin-top: 8px;
  }
  .score-screen.show { display: block; }
  .score-title {
    font-size: 32px;
    font-weight: 800;
    color: #e65100;
    margin-bottom: 10px;
  }
  .score-stars {
    font-size: 56px;
    margin: 10px 0;
    letter-spacing: 6px;
  }
  .score-detail {
    font-size: 22px;
    font-weight: 700;
    color: #555;
    margin-bottom: 20px;
  }
  .play-again-btn {
    background: linear-gradient(135deg, #ff9f1c, #e65100);
    color: #fff;
    border: none;
    font-size: 20px;
    font-weight: 800;
    padding: 14px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(230,81,0,0.4);
    transition: transform 0.15s;
  }
  .play-again-btn:hover { transform: scale(1.05); }

  /* Responsive */
  @media (max-width: 500px) {
    .item-emoji { font-size: 72px; }
    .item-label { font-size: 22px; }
    .bin { min-width: 90px; padding: 12px 6px; }
    .bin-icon { font-size: 34px; }
    .bin-label { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../../../../index.html">🏠 Home</a>
  <span>🗂️ Sorting & Matching</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('colour')">🎨 By Colour</button>
  <button class="tab-btn" onclick="switchTab('size')">📏 By Size</button>
  <button class="tab-btn" onclick="switchTab('shape')">🔷 By Shape</button>
</div>

<div class="game-area">
  <div class="score-bar">
    <span id="progress-text">Question 1 / 10</span>
    <span id="score-text">⭐ Score: 0</span>
  </div>

  <div class="item-card" id="item-card">
    <span class="item-emoji" id="item-emoji">🍎</span>
    <div class="item-label" id="item-label">Apple</div>
    <div class="question-text" id="question-text">What colour is this?</div>
    <div class="feedback-overlay" id="feedback-overlay"></div>
  </div>

  <div class="bins" id="bins-container"></div>

  <div class="score-screen" id="score-screen">
    <div class="score-title" id="result-title">Well done!</div>
    <div class="score-stars" id="result-stars">⭐⭐⭐</div>
    <div class="score-detail" id="result-detail">You got 10 out of 10!</div>
    <button class="play-again-btn" onclick="playAgain()">Play Again! 🎉</button>
  </div>
</div>

<!-- Font Picker Widget -->
<div id="font-fab" onclick="document.getElementById('font-panel').classList.toggle('open')" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,0.5);transition:transform .2s;user-select:none;">Aa</div>
<div id="font-panel" style="position:fixed;bottom:88px;right:24px;z-index:9998;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);padding:20px;width:240px;display:none;flex-direction:column;gap:10px;">
  <div style="font-size:13px;font-weight:700;color:#666;margin-bottom:4px;">CHOOSE FONT</div>
  <button onclick="setFont('Nunito')" data-font="Nunito" style="font-family:'Nunito',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:700;">Nunito — Hello World!</button>
  <button onclick="setFont('Fredoka One')" data-font="Fredoka One" style="font-family:'Fredoka One',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">Fredoka — Hello World!</button>
  <button onclick="setFont('Patrick Hand')" data-font="Patrick Hand" style="font-family:'Patrick Hand',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">Patrick Hand — Hello!</button>
  <button onclick="setFont('ABeeZee')" data-font="ABeeZee" style="font-family:'ABeeZee',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">ABeeZee — Hello World!</button>
  <button onclick="setFont('Poppins')" data-font="Poppins" style="font-family:'Poppins',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:600;">Poppins — Hello World!</button>
</div>
<style>#font-panel.open{display:flex!important;}body,button,input,select,textarea{font-family:var(--app-font,'Nunito'),sans-serif!important;}</style>
<script>(function(){var fonts={'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap','Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap','Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap','ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap','Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'};Object.values(fonts).forEach(function(href){if(!document.querySelector('link[href="'+href+'"]')){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}});var current=localStorage.getItem('dhanu-font')||'Nunito';document.querySelectorAll('#font-panel button[data-font]').forEach(function(b){if(b.getAttribute('data-font')===current){b.style.borderColor='#667eea';b.style.background='#f0f0ff';}});})();function setFont(name){localStorage.setItem('dhanu-font',name);location.reload();}</script>

<script>
// ===== DATA =====
var ACTIVITIES = {
  colour: {
    question: 'What colour is this?',
    categories: [
      { id: 'red',    icon: '🔴', label: 'Red',    bg: '#ffebee', border: '#ef5350' },
      { id: 'blue',   icon: '🔵', label: 'Blue',   bg: '#e3f2fd', border: '#1e88e5' },
      { id: 'yellow', icon: '🟡', label: 'Yellow', bg: '#fffde7', border: '#f9a825' }
    ],
    items: [
      { emoji: '🍎', label: 'Apple',     cat: 'red',    say: 'Red' },
      { emoji: '🌹', label: 'Rose',      cat: 'red',    say: 'Red' },
      { emoji: '🔥', label: 'Fire',      cat: 'red',    say: 'Red' },
      { emoji: '🌊', label: 'Ocean',     cat: 'blue',   say: 'Blue' },
      { emoji: '🫐', label: 'Blueberry', cat: 'blue',   say: 'Blue' },
      { emoji: '💙', label: 'Heart',     cat: 'blue',   say: 'Blue' },
      { emoji: '☀️', label: 'Sun',       cat: 'yellow', say: 'Yellow' },
      { emoji: '🌻', label: 'Sunflower', cat: 'yellow', say: 'Yellow' },
      { emoji: '🍋', label: 'Lemon',     cat: 'yellow', say: 'Yellow' },
      { emoji: '⭐', label: 'Star',      cat: 'yellow', say: 'Yellow' }
    ]
  },
  size: {
    question: 'What size is this?',
    categories: [
      { id: 'big',    icon: '🔵', label: 'Big',    bg: '#e8f5e9', border: '#43a047' },
      { id: 'medium', icon: '🟡', label: 'Medium', bg: '#fff8e1', border: '#fdd835' },
      { id: 'small',  icon: '🟢', label: 'Small',  bg: '#f3e5f5', border: '#ab47bc' }
    ],
    items: [
      { emoji: '🐘', label: 'Elephant',  cat: 'big',    say: 'Big' },
      { emoji: '🏠', label: 'House',     cat: 'big',    say: 'Big' },
      { emoji: '🚌', label: 'Bus',       cat: 'big',    say: 'Big' },
      { emoji: '🐱', label: 'Cat',       cat: 'medium', say: 'Medium' },
      { emoji: '🍎', label: 'Apple',     cat: 'medium', say: 'Medium' },
      { emoji: '📚', label: 'Book',      cat: 'medium', say: 'Medium' },
      { emoji: '🐜', label: 'Ant',       cat: 'small',  say: 'Small' },
      { emoji: '🌱', label: 'Seedling',  cat: 'small',  say: 'Small' },
      { emoji: '🐝', label: 'Bee',       cat: 'small',  say: 'Small' },
      { emoji: '🪲', label: 'Bug',       cat: 'small',  say: 'Small' }
    ]
  },
  shape: {
    question: 'What shape is this?',
    categories: [
      { id: 'circle',   icon: '⭕', label: 'Circle',   bg: '#e3f2fd', border: '#1e88e5' },
      { id: 'square',   icon: '🟦', label: 'Square',   bg: '#e8f5e9', border: '#43a047' },
      { id: 'triangle', icon: '🔺', label: 'Triangle', bg: '#fff3e0', border: '#fb8c00' }
    ],
    items: [
      { emoji: '🍕', label: 'Pizza Slice',   cat: 'triangle', say: 'Triangle' },
      { emoji: '🎡', label: 'Ferris Wheel',  cat: 'circle',   say: 'Circle' },
      { emoji: '⛺', label: 'Tent',          cat: 'triangle', say: 'Triangle' },
      { emoji: '⌚', label: 'Watch',         cat: 'circle',   say: 'Circle' },
      { emoji: '🎲', label: 'Dice',          cat: 'square',   say: 'Square' },
      { emoji: '📺', label: 'TV',            cat: 'square',   say: 'Square' },
      { emoji: '🍩', label: 'Donut',         cat: 'circle',   say: 'Circle' },
      { emoji: '🏠', label: 'House Roof',    cat: 'triangle', say: 'Triangle' },
      { emoji: '🪟', label: 'Window',        cat: 'square',   say: 'Square' },
      { emoji: '🌞', label: 'Sun',           cat: 'circle',   say: 'Circle' }
    ]
  }
};

// ===== STATE =====
var currentTab = 'colour';
var queue = [];
var currentIdx = 0;
var score = 0;
var busy = false;
var totalItems = 10;

function shuffleArr(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['colour','size','shape'][i] === tab);
  });
  startGame();
}

function startGame() {
  var act = ACTIVITIES[currentTab];
  queue = shuffleArr(act.items);
  currentIdx = 0;
  score = 0;
  busy = false;
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('bins-container').style.display = '';
  document.getElementById('item-card').style.display = '';
  renderBins();
  renderItem();
  updateScoreBar();
}

function renderBins() {
  var act = ACTIVITIES[currentTab];
  var html = '';
  act.categories.forEach(function(cat) {
    html += '<div class="bin" onclick="checkAnswer(\'' + cat.id + '\')" style="background:' + cat.bg + ';border-color:' + cat.border + ';">' +
      '<span class="bin-icon">' + cat.icon + '</span>' +
      '<div class="bin-label" style="color:#333;">' + cat.label + '</div>' +
      '</div>';
  });
  document.getElementById('bins-container').innerHTML = html;
}

function renderItem() {
  var item = queue[currentIdx];
  document.getElementById('item-emoji').textContent = item.emoji;
  document.getElementById('item-label').textContent = item.label;
  document.getElementById('question-text').textContent = ACTIVITIES[currentTab].question;
  var ov = document.getElementById('feedback-overlay');
  ov.className = 'feedback-overlay';
  ov.textContent = '';
}

function updateScoreBar() {
  document.getElementById('progress-text').textContent = 'Question ' + (currentIdx + 1) + ' / ' + totalItems;
  document.getElementById('score-text').textContent = '⭐ Score: ' + score;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function checkAnswer(selectedCat) {
  if (busy) return;
  var item = queue[currentIdx];
  var correct = item.cat === selectedCat;
  busy = true;

  var bins = document.querySelectorAll('.bin');
  var act = ACTIVITIES[currentTab];

  // Find which bin was clicked
  bins.forEach(function(bin, i) {
    if (act.categories[i].id === selectedCat) {
      bin.classList.add(correct ? 'flash-correct' : 'flash-wrong');
    }
  });

  var ov = document.getElementById('feedback-overlay');
  if (correct) {
    ov.textContent = '✅';
    ov.classList.add('show-correct');
    score++;
    speak('Great! That is ' + item.say + '!');
  } else {
    ov.textContent = '❌';
    ov.classList.add('show-wrong');
    speak('Oops! Try again!');
  }

  updateScoreBar();

  setTimeout(function() {
    bins.forEach(function(b) { b.classList.remove('flash-correct','flash-wrong'); });
    ov.className = 'feedback-overlay';
    ov.textContent = '';
    currentIdx++;
    if (currentIdx >= totalItems) {
      showScore();
    } else {
      renderItem();
      busy = false;
    }
  }, correct ? 900 : 1100);
}

function showScore() {
  document.getElementById('item-card').style.display = 'none';
  document.getElementById('bins-container').style.display = 'none';
  var screen = document.getElementById('score-screen');
  screen.classList.add('show');

  var stars = score >= 9 ? '⭐⭐⭐' : score >= 6 ? '⭐⭐' : '⭐';
  var title = score >= 9 ? 'Amazing! You are a sorting superstar! 🎉' :
               score >= 6 ? 'Great job! Keep practising! 👏' :
               'Good try! Let\'s try again! 💪';

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-detail').textContent = 'You got ' + score + ' out of ' + totalItems + '!';

  if (score >= 9) speak('Amazing! You are a sorting superstar!');
  else if (score >= 6) speak('Great job! Keep practising!');
  else speak('Good try! Let us try again!');
}

function playAgain() {
  startGame();
}

// Init
startGame();
</script>

<script src="/tts.js"></script>
</body>
</html>
