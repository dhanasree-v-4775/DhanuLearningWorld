<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var fonts={'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap','Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap','Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap','ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap','Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'};var chosen=localStorage.getItem('dhanu-font')||'Nunito';if(fonts[chosen]){var l=document.createElement('link');l.rel='stylesheet';l.href=fonts[chosen];document.head.appendChild(l);}document.documentElement.style.setProperty('--app-font',chosen);})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏫 My School</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--app-font, 'Nunito'), sans-serif;
    background: linear-gradient(135deg, #6c5ce7, #4a148c);
    min-height: 100vh;
    color: #333;
  }
  .topbar {
    background: rgba(0,0,0,0.25);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    backdrop-filter: blur(6px);
  }
  .topbar a {
    color: #fff;
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    background: rgba(255,255,255,0.2);
    padding: 6px 14px;
    border-radius: 20px;
  }
  .topbar span { color: #fff; font-size: 22px; font-weight: 800; }

  .tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 18px 16px 10px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 3px solid rgba(255,255,255,0.4);
    border-radius: 30px;
    padding: 10px 22px;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--app-font, 'Nunito'), sans-serif;
  }
  .tab-btn.active { background: #fff; color: #4a148c; border-color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.16); }

  /* === SCHOOL THINGS TAB === */
  #tab-things { padding: 16px; }
  .things-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    max-width: 920px;
    margin: 0 auto;
  }
  .thing-card {
    background: #fff;
    border-radius: 22px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 5px 18px rgba(0,0,0,0.12);
    transition: transform 0.18s;
    user-select: none;
  }
  .thing-card:hover, .thing-card:active { transform: scale(1.07); }
  .thing-emoji { font-size: 52px; display: block; margin-bottom: 8px; }
  .thing-name { font-size: 17px; font-weight: 800; color: #4a148c; margin-bottom: 5px; }
  .thing-use { font-size: 12px; color: #666; line-height: 1.4; }
  .hear-thing {
    margin-top: 10px;
    background: linear-gradient(135deg, #6c5ce7, #4a148c);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--app-font, 'Nunito'), sans-serif;
    transition: transform 0.15s;
  }
  .hear-thing:hover { transform: scale(1.08); }

  /* === PEOPLE TAB === */
  #tab-people { display: none; padding: 16px; }
  .people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
    max-width: 900px;
    margin: 0 auto;
  }
  .people-card {
    background: #fff;
    border-radius: 26px;
    padding: 28px 18px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 6px 22px rgba(0,0,0,0.13);
    transition: transform 0.18s;
    user-select: none;
  }
  .people-card:hover, .people-card:active { transform: scale(1.06); }
  .people-emoji { font-size: 64px; display: block; margin-bottom: 10px; }
  .people-name { font-size: 22px; font-weight: 800; color: #4a148c; margin-bottom: 6px; }
  .people-desc { font-size: 14px; color: #666; line-height: 1.4; }
  .hear-people {
    margin-top: 12px;
    background: linear-gradient(135deg, #6c5ce7, #4a148c);
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--app-font, 'Nunito'), sans-serif;
    transition: transform 0.15s;
  }
  .hear-people:hover { transform: scale(1.08); }

  /* === QUIZ TAB === */
  #tab-quiz { display: none; padding: 20px 16px; }
  .quiz-box {
    background: #fff;
    border-radius: 28px;
    padding: 30px 24px;
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.14);
  }
  .qprog { font-size: 16px; color: #aaa; font-weight: 700; margin-bottom: 6px; }
  .qbar { background: #ede7f6; border-radius: 20px; height: 12px; margin-bottom: 18px; overflow: hidden; }
  .qfill { background: linear-gradient(90deg, #6c5ce7, #4a148c); height: 100%; border-radius: 20px; transition: width 0.4s; }
  .q-em { font-size: 68px; display: block; margin-bottom: 8px; }
  .q-txt { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 22px; line-height: 1.35; }
  .q-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .q-opt {
    background: #ede7f6;
    border: 3px solid #ce93d8;
    border-radius: 18px;
    padding: 18px 8px;
    font-size: 20px;
    cursor: pointer;
    font-weight: 800;
    transition: all 0.18s;
    font-family: var(--app-font, 'Nunito'), sans-serif;
    color: #333;
    line-height: 1.3;
  }
  .q-opt:hover { transform: scale(1.05); }
  .q-opt.correct { background: #c8f7c5; border-color: #4caf50; }
  .q-opt.wrong { background: #ffdde0; border-color: #f44336; }
  .q-fb { margin-top: 14px; font-size: 20px; font-weight: 800; min-height: 28px; }
  .q-fb.good { color: #4caf50; }
  .q-fb.bad { color: #f44336; }
  .q-nxt { margin-top: 14px; background: linear-gradient(135deg,#6c5ce7,#4a148c); color: #fff; border: none; border-radius: 22px; padding: 12px 28px; font-size: 18px; font-weight: 800; cursor: pointer; display: none; font-family: var(--app-font,'Nunito'),sans-serif; }
  .result-box { text-align: center; }
  .r-em { font-size: 70px; }
  .r-title { font-size: 28px; font-weight: 800; color: #4a148c; margin: 10px 0; }
  .r-score { font-size: 20px; color: #555; margin-bottom: 18px; }
  .restart { background: linear-gradient(135deg,#6c5ce7,#4a148c); color: #fff; border: none; border-radius: 22px; padding: 12px 28px; font-size: 18px; font-weight: 800; cursor: pointer; font-family: var(--app-font,'Nunito'),sans-serif; }
</style>
</head>
<body>

<div class="topbar">
  <a href="../../../../index.html">🏠 Home</a>
  <span>🏫 My School</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('things')">✏️ School Things</button>
  <button class="tab-btn" onclick="showTab('people')">👩‍🏫 People</button>
  <button class="tab-btn" onclick="showTab('quiz')">🧠 Quiz</button>
</div>

<!-- SCHOOL THINGS TAB -->
<div id="tab-things">
  <div class="things-grid" id="things-grid"></div>
</div>

<!-- PEOPLE TAB -->
<div id="tab-people">
  <div class="people-grid" id="people-grid"></div>
</div>

<!-- QUIZ TAB -->
<div id="tab-quiz">
  <div class="quiz-box" id="quiz-box">
    <div class="qprog" id="qprog">Question 1 of 10</div>
    <div class="qbar"><div class="qfill" id="qfill" style="width:0%"></div></div>
    <span class="q-em" id="q-em"></span>
    <div class="q-txt" id="q-txt"></div>
    <div class="q-opts" id="q-opts"></div>
    <div class="q-fb" id="q-fb"></div>
    <button class="q-nxt" id="q-nxt" onclick="nextQ()">Next ➡️</button>
  </div>
</div>

<script>
var schoolThings = [
  { emoji:'✏️', name:'Pencil',     use:'We write and draw with a pencil' },
  { emoji:'📏', name:'Ruler',      use:'We measure things with a ruler' },
  { emoji:'🗑️', name:'Eraser',    use:'We rub out mistakes with an eraser' },
  { emoji:'🖍️', name:'Crayon',    use:'We colour pictures with crayons' },
  { emoji:'✂️', name:'Scissors',  use:'We cut paper with scissors carefully' },
  { emoji:'🖊️', name:'Pen',       use:'We write with a pen' },
  { emoji:'📚', name:'Books',      use:'We read and learn from books' },
  { emoji:'🎒', name:'Bag',        use:'We carry our things in a school bag' },
  { emoji:'🪑', name:'Chair',      use:'We sit on a chair to learn' },
  { emoji:'🖥️', name:'Board',     use:'Our teacher writes on the board' },
  { emoji:'🍱', name:'Lunch box',  use:'We bring our lunch in a lunch box' },
  { emoji:'📐', name:'Set square', use:'We draw straight lines with a set square' }
];

var peopleParts = [
  { emoji:'👩‍🏫', name:'Teacher',      desc:'Our teacher helps us learn new things every day!' },
  { emoji:'👨‍🏫', name:'Head Teacher', desc:'The head teacher looks after our whole school!' },
  { emoji:'🧑‍🍳', name:'Cook',         desc:'The school cook makes our yummy lunch!' },
  { emoji:'🧹', name:'Cleaner',       desc:'The cleaner keeps our school clean and tidy!' },
  { emoji:'🧑‍🤝‍🧑', name:'Friends',  desc:'Our school friends make every day fun and happy!' }
];

var quizQs = [
  { em:'🗑️', q:'What do you use to rub out a mistake?', answer:'Eraser',      opts:['Pencil','Eraser','Ruler','Crayon'] },
  { em:'👩‍🏫', q:'Who helps you learn new things every day?', answer:'Teacher', opts:['Cook','Friends','Teacher','Cleaner'] },
  { em:'🎒', q:'What do you carry your books in?', answer:'Bag',               opts:['Chair','Bag','Ruler','Lunch box'] },
  { em:'🖍️', q:'What do you use to colour pictures?', answer:'Crayon',        opts:['Pen','Scissors','Ruler','Crayon'] },
  { em:'✂️', q:'What do you use to cut paper carefully?', answer:'Scissors',  opts:['Ruler','Scissors','Pen','Pencil'] },
  { em:'📏', q:'What do you use to measure things?', answer:'Ruler',          opts:['Ruler','Eraser','Crayon','Bag'] },
  { em:'🧑‍🍳', q:'Who makes your yummy school lunch?', answer:'Cook',         opts:['Teacher','Head Teacher','Cook','Cleaner'] },
  { em:'📚', q:'What do you read and learn from?', answer:'Books',            opts:['Chair','Bag','Books','Board'] },
  { em:'🧹', q:'Who keeps the school clean and tidy?', answer:'Cleaner',      opts:['Cook','Cleaner','Teacher','Friends'] },
  { em:'🖥️', q:'What does the teacher write on?', answer:'Board',            opts:['Book','Pencil','Board','Chair'] }
];

var qIdx = 0, qScore = 0, qAnswered = false;

function buildThings() {
  var grid = document.getElementById('things-grid');
  grid.innerHTML = '';
  schoolThings.forEach(function(t) {
    var card = document.createElement('div');
    card.className = 'thing-card';
    card.innerHTML =
      '<span class="thing-emoji">' + t.emoji + '</span>' +
      '<div class="thing-name">' + t.name + '</div>' +
      '<div class="thing-use">' + t.use + '</div>' +
      '<button class="hear-thing" onclick="event.stopPropagation();speak(\'' + t.name + '. ' + t.use.replace(/'/g,"\\'") + '\')">🔊 Hear</button>';
    card.addEventListener('click', function() { speak(t.name + '. ' + t.use); });
    grid.appendChild(card);
  });
}

function buildPeople() {
  var grid = document.getElementById('people-grid');
  grid.innerHTML = '';
  peopleParts.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'people-card';
    card.innerHTML =
      '<span class="people-emoji">' + p.emoji + '</span>' +
      '<div class="people-name">' + p.name + '</div>' +
      '<div class="people-desc">' + p.desc + '</div>' +
      '<button class="hear-people" onclick="event.stopPropagation();speak(\'' + p.name + '. ' + p.desc.replace(/'/g,"\\'") + '\')">🔊 Hear</button>';
    card.addEventListener('click', function() { speak(p.name + '. ' + p.desc); });
    grid.appendChild(card);
  });
}

function showTab(tab) {
  ['things','people','quiz'].forEach(function(t) {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['things','people','quiz'][i]===tab);
  });
  if (tab === 'quiz') startQuiz();
}

function startQuiz() {
  qIdx = 0; qScore = 0; qAnswered = false;
  var box = document.getElementById('quiz-box');
  if (!document.getElementById('qprog')) {
    box.innerHTML = '<div class="qprog" id="qprog"></div><div class="qbar"><div class="qfill" id="qfill" style="width:0%"></div></div><span class="q-em" id="q-em"></span><div class="q-txt" id="q-txt"></div><div class="q-opts" id="q-opts"></div><div class="q-fb" id="q-fb"></div><button class="q-nxt" id="q-nxt" onclick="nextQ()">Next ➡️</button>';
  }
  showQ();
}

function showQ() {
  var q = quizQs[qIdx];
  document.getElementById('qprog').textContent = 'Question '+(qIdx+1)+' of '+quizQs.length;
  document.getElementById('qfill').style.width = (qIdx/quizQs.length*100)+'%';
  document.getElementById('q-em').textContent = q.em;
  document.getElementById('q-txt').textContent = q.q;
  document.getElementById('q-fb').textContent = '';
  document.getElementById('q-fb').className = 'q-fb';
  document.getElementById('q-nxt').style.display = 'none';
  qAnswered = false;
  var optsEl = document.getElementById('q-opts');
  optsEl.innerHTML = '';
  q.opts.forEach(function(opt) {
    var tObj = schoolThings.find(function(s) { return s.name === opt; }) ||
               peopleParts.find(function(p) { return p.name === opt; });
    var btn = document.createElement('button');
    btn.className = 'q-opt';
    btn.innerHTML = (tObj ? tObj.emoji + '<br>' : '') + '<span style="font-size:15px">' + opt + '</span>';
    btn.onclick = function() { checkQ(opt, btn); };
    optsEl.appendChild(btn);
  });
  speak(q.q);
}

function checkQ(chosen, btn) {
  if (qAnswered) return;
  qAnswered = true;
  var correct = quizQs[qIdx].answer;
  var fb = document.getElementById('q-fb');
  if (chosen === correct) {
    qScore++;
    btn.classList.add('correct');
    fb.textContent = '⭐ Correct! Well done!';
    fb.className = 'q-fb good';
    speak('Correct! Well done!');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.q-opt').forEach(function(b) {
      if (b.textContent.includes(correct)) b.classList.add('correct');
    });
    fb.textContent = '❌ The answer is ' + correct + '!';
    fb.className = 'q-fb bad';
    speak('The answer is ' + correct);
  }
  document.getElementById('q-nxt').style.display = 'block';
}

function nextQ() {
  qIdx++;
  if (qIdx >= quizQs.length) showResult();
  else showQ();
}

function showResult() {
  var stars = qScore>=9?'🌟🌟🌟':qScore>=7?'⭐⭐⭐':qScore>=5?'⭐⭐':'⭐';
  var msg = qScore>=9?'Brilliant! You know your school!':qScore>=7?'Well done! Great job!':qScore>=5?'Good try! Keep learning!':'Keep practising!';
  document.getElementById('quiz-box').innerHTML =
    '<div class="result-box"><div class="r-em">'+stars+'</div>' +
    '<div class="r-title">You got '+qScore+' out of '+quizQs.length+'!</div>' +
    '<div class="r-score">'+msg+'</div>' +
    '<button class="restart" onclick="startQuiz()">🔄 Try Again</button></div>';
  speak(msg + '. You got ' + qScore + ' out of ' + quizQs.length);
}

function speak(text) {
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

buildThings();
buildPeople();
</script>

<div id="font-fab" onclick="document.getElementById('font-panel').classList.toggle('open')" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,0.5);transition:transform .2s;user-select:none;">Aa</div>
<div id="font-panel" style="position:fixed;bottom:88px;right:24px;z-index:9998;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);padding:20px;width:240px;display:none;flex-direction:column;gap:10px;">
  <div style="font-size:13px;font-weight:700;color:#666;margin-bottom:4px;">CHOOSE FONT</div>
  <button onclick="setFont('Nunito')" data-font="Nunito" style="font-family:'Nunito',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:700;">Nunito — Hello World!</button>
  <button onclick="setFont('Fredoka One')" data-font="Fredoka One" style="font-family:'Fredoka One',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">Fredoka — Hello World!</button>
  <button onclick="setFont('Patrick Hand')" data-font="Patrick Hand" style="font-family:'Patrick Hand',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">Patrick Hand — Hello!</button>
  <button onclick="setFont('ABeeZee')" data-font="ABeeZee" style="font-family:'ABeeZee',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;">ABeeZee — Hello World!</button>
  <button onclick="setFont('Poppins')" data-font="Poppins" style="font-family:'Poppins',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:600;">Poppins — Hello World!</button>
</div>
<style>#font-panel.open{display:flex!important;}body,button,input,select,textarea{font-family:var(--app-font,'Nunito'),sans-serif!important;}</style>
<script>(function(){var fonts={'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap','Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap','Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap','ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap','Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'};Object.values(fonts).forEach(function(href){if(!document.querySelector('link[href="'+href+'"]')){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}});var current=localStorage.getItem('dhanu-font')||'Nunito';document.querySelectorAll('#font-panel button[data-font]').forEach(function(b){if(b.getAttribute('data-font')===current){b.style.borderColor='#667eea';b.style.background='#f0f0ff';}});})();function setFont(name){localStorage.setItem('dhanu-font',name);location.reload();}</script>
<script src="/tts.js"></script>
</body>
</html>
