<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var fonts={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  var chosen=localStorage.getItem('dhanu-font')||'Nunito';
  if(fonts[chosen]){
    var l=document.createElement('link');
    l.rel='stylesheet';l.href=fonts[chosen];
    document.head.appendChild(l);
  }
  document.documentElement.style.setProperty('--app-font',chosen);
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Handling – Charts & Graphs</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--app-font,'Nunito'),sans-serif;background:linear-gradient(135deg,#004d40,#00695c,#00897b);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  .topbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(0,0,0,0.25);color:white;}
  .topbar a{color:white;text-decoration:none;background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;}
  .tabs{display:flex;gap:8px;padding:12px 20px;justify-content:center;flex-wrap:wrap;}
  .tab{padding:9px 20px;border-radius:50px;border:2px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.12);color:white;font-family:inherit;font-size:0.95em;cursor:pointer;transition:all 0.2s;}
  .tab.active{background:white;color:#004d40;font-weight:bold;}
  .tab:hover{background:rgba(255,255,255,0.3);}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;width:100%;gap:14px;}

  /* SCORE */
  .score-row{display:flex;gap:16px;color:white;font-size:1em;justify-content:center;}
  .sc-box{background:rgba(255,255,255,0.2);border-radius:14px;padding:8px 20px;text-align:center;}
  .sc-box .val{font-size:1.5em;font-weight:bold;display:block;}

  /* CARD */
  .card{width:760px;max-width:100%;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.35);padding:28px 32px;}
  .card-title{font-size:1.3em;font-weight:bold;color:#004d40;margin-bottom:6px;text-align:center;}
  .card-sub{font-size:0.95em;color:#888;text-align:center;margin-bottom:18px;}

  /* BAR CHART */
  .chart-wrap{display:flex;flex-direction:column;align-items:center;margin:16px 0;}
  .bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding-bottom:4px;border-bottom:3px solid #333;border-left:3px solid #333;padding-left:8px;padding-right:8px;position:relative;}
  .y-axis{position:absolute;left:-32px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;font-size:0.8em;color:#666;}
  .bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .bar{border-radius:8px 8px 0 0;transition:height 0.6s ease;cursor:pointer;position:relative;min-width:40px;}
  .bar:hover{filter:brightness(1.15);}
  .bar-val{font-size:0.85em;font-weight:bold;color:#333;text-align:center;}
  .bar-lbl{font-size:0.8em;color:#555;text-align:center;max-width:60px;word-wrap:break-word;}
  .bar-emoji{font-size:1.4em;text-align:center;}

  /* TALLY */
  .tally-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:1em;}
  .tally-table th{background:#004d40;color:white;padding:10px 14px;text-align:left;border-radius:0;}
  .tally-table th:first-child{border-radius:10px 0 0 0;}
  .tally-table th:last-child{border-radius:0 10px 0 0;}
  .tally-table td{padding:10px 14px;border-bottom:1px solid #eee;}
  .tally-table tr:hover td{background:#e0f2f1;}
  .tally-marks{display:flex;gap:3px;align-items:center;flex-wrap:wrap;}
  .tally-group{display:flex;gap:1px;align-items:center;}
  .tally-v{display:inline-block;width:3px;height:20px;background:#004d40;border-radius:2px;}
  .tally-d{display:inline-block;width:22px;height:3px;background:#c00;border-radius:2px;transform:rotate(-12deg);margin:0 2px;}

  /* PICTOGRAPH */
  .picto-table{width:100%;margin:16px 0;}
  .picto-row{display:flex;align-items:center;gap:8px;margin:8px 0;padding:6px 8px;border-radius:12px;transition:background 0.2s;}
  .picto-row:hover{background:#e0f2f1;}
  .picto-label{min-width:100px;font-size:1em;font-weight:bold;color:#333;}
  .picto-icons{display:flex;flex-wrap:wrap;gap:3px;}
  .picto-icon{font-size:1.6em;animation:popIn 0.3s ease both;}
  @keyframes popIn{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .picto-count{font-size:1em;font-weight:bold;color:#004d40;margin-left:6px;}

  /* QUESTIONS */
  .q-box{background:#f5f5f5;border-radius:16px;padding:16px;margin:14px 0;}
  .q-text{font-size:1.1em;color:#333;margin-bottom:12px;font-weight:bold;}
  .q-opts{display:flex;flex-wrap:wrap;gap:8px;}
  .q-opt{padding:9px 20px;border-radius:50px;border:2px solid #b2dfdb;background:white;font-family:inherit;font-size:1em;cursor:pointer;color:#333;transition:all 0.2s;}
  .q-opt:hover{border-color:#00897b;background:#e0f2f1;}
  .q-opt.correct{border-color:#4caf50;background:#c8f7c5;color:#1b5e20;}
  .q-opt.wrong{border-color:#e53935;background:#ffcdd2;color:#b71c1c;}

  .feedback{font-size:1.2em;font-weight:bold;text-align:center;min-height:32px;margin-top:8px;}
  .btn-row{display:flex;gap:10px;justify-content:center;margin-top:14px;}
  .action-btn{border:none;border-radius:50px;padding:12px 28px;font-size:1.1em;font-family:inherit;cursor:pointer;color:white;transition:transform 0.15s;}
  .action-btn:hover{transform:scale(1.05);}

  .dataset-sel{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
  .ds-btn{padding:8px 18px;border-radius:50px;border:2px solid #b2dfdb;background:white;font-family:inherit;font-size:0.95em;cursor:pointer;color:#004d40;transition:all 0.2s;}
  .ds-btn.active{background:#004d40;color:white;border-color:#004d40;}
  .ds-btn:hover{background:#e0f2f1;}

  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
</style>
</head>
<body>
<div class="topbar">
  <a href="../../../../index.html">🏠 Home</a>
  <span style="color:white;font-size:1.1em;font-weight:bold">📊 Data Handling – Charts & Graphs</span>
  <span style="color:white;font-size:0.9em">Maths</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="setMode('bar',this)">📊 Bar Charts</button>
  <button class="tab" onclick="setMode('tally',this)">✏️ Tally Marks</button>
  <button class="tab" onclick="setMode('picto',this)">🖼️ Pictographs</button>
  <button class="tab" onclick="setMode('quiz',this)">🧩 Quiz</button>
</div>
<div class="main">
  <div class="score-row" id="scoreRow" style="display:none">
    <div class="sc-box"><span class="val" id="sRight">0</span>✅</div>
    <div class="sc-box"><span class="val" id="sWrong">0</span>❌</div>
    <div class="sc-box"><span class="val" id="sStreak">0</span>🔥</div>
  </div>
  <div class="card" id="mainCard"></div>
</div>

<script>
// ============ DATA SETS ============
const datasets = [
  {
    id: 0,
    title: "🐾 Favourite Animals",
    sub: "Children voted for their favourite animal",
    labels: ['🐶 Dog','🐱 Cat','🐰 Rabbit','🐠 Fish','🐦 Bird'],
    emojis: ['🐶','🐱','🐰','🐠','🐦'],
    values: [6, 4, 3, 5, 2],
    colors: ['#FF7043','#AB47BC','#66BB6A','#42A5F5','#FFA726'],
    questions: [
      {q:"Which animal got the MOST votes?", opts:['🐶 Dog','🐱 Cat','🐰 Rabbit','🐠 Fish'], ans:'🐶 Dog'},
      {q:"Which animal got the FEWEST votes?", opts:['🐦 Bird','🐰 Rabbit','🐱 Cat','🐶 Dog'], ans:'🐦 Bird'},
      {q:"How many children voted for Cat?", opts:['3','4','5','6'], ans:'4'},
      {q:"How many more voted for Dog than Rabbit?", opts:['1','2','3','4'], ans:'3'},
      {q:"How many children voted altogether?", opts:['18','20','22','25'], ans:'20'},
    ]
  },
  {
    id: 1,
    title: "🍦 Favourite Ice Cream",
    sub: "Children picked their favourite flavour",
    labels: ['🍓 Strawberry','🍫 Chocolate','🍋 Lemon','🍦 Vanilla','🍈 Mint'],
    emojis: ['🍓','🍫','🍋','🍦','🍈'],
    values: [5, 8, 2, 7, 3],
    colors: ['#EC407A','#8D6E63','#FDD835','#F8BBD0','#A5D6A7'],
    questions: [
      {q:"Which flavour is MOST popular?", opts:['Strawberry','Chocolate','Vanilla','Mint'], ans:'Chocolate'},
      {q:"Which flavour is LEAST popular?", opts:['Lemon','Mint','Strawberry','Vanilla'], ans:'Lemon'},
      {q:"How many chose Vanilla?", opts:['5','6','7','8'], ans:'7'},
      {q:"How many more chose Chocolate than Lemon?", opts:['4','5','6','7'], ans:'6'},
      {q:"How many chose Strawberry AND Mint together?", opts:['6','7','8','9'], ans:'8'},
    ]
  },
  {
    id: 2,
    title: "🌤️ Weather This Week",
    sub: "Weather recorded each day for 2 weeks",
    labels: ['☀️ Sunny','🌧️ Rainy','☁️ Cloudy','⛅ Partly','🌩️ Stormy'],
    emojis: ['☀️','🌧️','☁️','⛅','🌩️'],
    values: [7, 3, 4, 5, 2],
    colors: ['#FDD835','#42A5F5','#90A4AE','#80DEEA','#7E57C2'],
    questions: [
      {q:"How many sunny days were there?", opts:['5','6','7','8'], ans:'7'},
      {q:"Which type of weather happened LEAST?", opts:['Sunny','Rainy','Cloudy','Stormy'], ans:'Stormy'},
      {q:"How many rainy OR stormy days?", opts:['4','5','6','7'], ans:'5'},
      {q:"Which had MORE days — Cloudy or Partly Cloudy?", opts:['Cloudy','Partly Cloudy','They are equal','Cannot tell'], ans:'Partly Cloudy'},
      {q:"How many days were recorded in total?", opts:['18','19','21','22'], ans:'21'},
    ]
  },
  {
    id: 3,
    title: "🎨 Favourite Colours",
    sub: "Children in Class 1 chose their favourite colour",
    labels: ['🔴 Red','🔵 Blue','🟡 Yellow','🟢 Green','🟣 Purple'],
    emojis: ['🔴','🔵','🟡','🟢','🟣'],
    values: [4, 7, 3, 5, 6],
    colors: ['#EF5350','#42A5F5','#FDD835','#66BB6A','#AB47BC'],
    questions: [
      {q:"Which colour is the FAVOURITE?", opts:['Red','Blue','Green','Purple'], ans:'Blue'},
      {q:"How many chose Yellow?", opts:['2','3','4','5'], ans:'3'},
      {q:"Which TWO colours together make 10?", opts:['Red & Blue','Blue & Yellow','Red & Purple','Green & Purple'], ans:'Red & Purple'},
      {q:"How many MORE chose Blue than Red?", opts:['2','3','4','5'], ans:'3'},
      {q:"How many children are in the class?", opts:['23','25','26','28'], ans:'25'},
    ]
  }
];

let mode = 'bar';
let currentDS = 0;
let quizDSIdx = 0;
let quizQIdx = 0;
let quizRight = 0, quizWrong = 0, quizStreak = 0;
let quizAnswered = false;

function setMode(m, tab) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('scoreRow').style.display = m === 'quiz' ? 'flex' : 'none';
  render();
}

function render() {
  if (mode === 'bar') renderBar();
  else if (mode === 'tally') renderTally();
  else if (mode === 'picto') renderPicto();
  else renderQuiz();
}

// ============ DATASET SELECTOR ============
function dsSelectorHTML(active) {
  return `<div class="dataset-sel">
    ${datasets.map((d,i) => `<button class="ds-btn ${i===active?'active':''}" onclick="currentDS=${i};render()">${d.title.split(' ').slice(0,2).join(' ')}</button>`).join('')}
  </div>`;
}

// ============ BAR CHART MODE ============
function renderBar() {
  const ds = datasets[currentDS];
  const maxVal = Math.max(...ds.values);
  const chartH = 180; // px height of chart

  let barsHTML = ds.labels.map((lbl, i) => {
    const h = Math.round((ds.values[i] / maxVal) * chartH);
    return `<div class="bar-col">
      <div class="bar-val">${ds.values[i]}</div>
      <div class="bar" style="height:${h}px;background:${ds.colors[i]};width:50px;" title="${lbl}: ${ds.values[i]}"></div>
      <div class="bar-emoji">${ds.emojis[i]}</div>
      <div class="bar-lbl">${lbl.replace(/^[^\s]+\s/, '')}</div>
    </div>`;
  }).join('');

  // Y-axis labels
  const yLabels = [0, Math.round(maxVal/2), maxVal].map(v => `<span>${v}</span>`).join('');

  let questionsHTML = ds.questions.slice(0, 3).map((q, qi) => `
    <div class="q-box">
      <div class="q-text">Q${qi+1}: ${q.q}</div>
      <div class="q-opts">
        ${q.opts.map(o => `<button class="q-opt" onclick="checkBarQ(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}',${qi})">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="barfb${qi}"></div>
    </div>
  `).join('');

  document.getElementById('mainCard').innerHTML = `
    ${dsSelectorHTML(currentDS)}
    <div class="card-title">${ds.title}</div>
    <div class="card-sub">${ds.sub}</div>
    <div class="chart-wrap">
      <div style="position:relative;padding-left:36px">
        <div style="position:absolute;left:0;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;font-size:0.8em;color:#666;padding-bottom:4px">
          <span>${maxVal}</span>
          <span>${Math.round(maxVal/2)}</span>
          <span>0</span>
        </div>
        <div class="bar-chart">${barsHTML}</div>
      </div>
    </div>
    <div style="background:#e0f2f1;border-radius:12px;padding:12px 16px;margin:12px 0;font-size:0.95em;color:#004d40">
      <b>📖 How to read a bar chart:</b> The taller the bar, the more there are! Look at the number at the top of each bar to find the exact amount.
    </div>
    <div class="section-title" style="color:#004d40;font-weight:bold;font-size:1.1em;margin-bottom:6px">❓ Questions about this chart:</div>
    ${questionsHTML}
    <div class="btn-row">
      <button class="action-btn" style="background:#00897b" onclick="speak('This bar chart shows ${ds.sub}')">🔊 Read Title</button>
    </div>
  `;
}

function checkBarQ(btn, val, ans, qi) {
  const container = btn.parentElement;
  const btns = container.querySelectorAll('.q-opt');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('barfb' + qi);
  if (val === ans) {
    btn.classList.add('correct');
    fb.textContent = '✅ Correct! ' + ans + ' is right!';
    fb.style.color = '#2e7d32';
  } else {
    btn.classList.add('wrong');
    btns.forEach(b => { if (b.textContent === ans) b.classList.add('correct'); });
    fb.textContent = '❌ The answer is: ' + ans;
    fb.style.color = '#c62828';
  }
}

// ============ TALLY MARKS MODE ============
function renderTally() {
  const ds = datasets[currentDS];

  function tallyHTML(n) {
    let html = '<div class="tally-marks">';
    const groups = Math.floor(n / 5);
    const rem = n % 5;
    for (let g = 0; g < groups; g++) {
      html += '<div class="tally-group">';
      for (let v = 0; v < 4; v++) html += '<span class="tally-v"></span>';
      html += '<span class="tally-d"></span></div>';
    }
    if (rem > 0) {
      html += '<div class="tally-group">';
      for (let v = 0; v < rem; v++) html += '<span class="tally-v"></span>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  let tableRows = ds.labels.map((lbl, i) => `
    <tr>
      <td><span style="font-size:1.3em">${ds.emojis[i]}</span> ${lbl.replace(/^[^\s]+\s/, '')}</td>
      <td>${tallyHTML(ds.values[i])}</td>
      <td style="font-weight:bold;color:#004d40;font-size:1.2em">${ds.values[i]}</td>
    </tr>
  `).join('');

  let questionsHTML = ds.questions.slice(0, 3).map((q, qi) => `
    <div class="q-box">
      <div class="q-text">Q${qi+1}: ${q.q}</div>
      <div class="q-opts">
        ${q.opts.map(o => `<button class="q-opt" onclick="checkBarQ(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}',${qi+10})">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="barfb${qi+10}"></div>
    </div>
  `).join('');

  document.getElementById('mainCard').innerHTML = `
    ${dsSelectorHTML(currentDS)}
    <div class="card-title">${ds.title}</div>
    <div class="card-sub">${ds.sub}</div>
    <div style="background:#e0f2f1;border-radius:12px;padding:12px 16px;margin:12px 0;font-size:0.95em;color:#004d40">
      <b>✏️ How tally marks work:</b> We make 4 lines then a diagonal cross for 5. Count in 5s then add the extras!
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <div class="tally-group"><span class="tally-v"></span><span class="tally-v"></span><span class="tally-v"></span><span class="tally-v"></span><span class="tally-d"></span></div>
        <span>= 5</span>
        &nbsp;&nbsp;
        <div class="tally-group"><span class="tally-v"></span><span class="tally-v"></span><span class="tally-v"></span><span class="tally-v"></span><span class="tally-d"></span></div>
        <div class="tally-group"><span class="tally-v"></span><span class="tally-v"></span></div>
        <span>= 7</span>
      </div>
    </div>
    <table class="tally-table">
      <thead><tr><th>Item</th><th>Tally</th><th>Total</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="section-title" style="color:#004d40;font-weight:bold;font-size:1.1em;margin-bottom:6px">❓ Questions:</div>
    ${questionsHTML}
  `;
}

// ============ PICTOGRAPH MODE ============
function renderPicto() {
  const ds = datasets[currentDS];
  const maxVal = Math.max(...ds.values);

  let rows = ds.labels.map((lbl, i) => {
    let icons = '';
    for (let j = 0; j < ds.values[i]; j++) {
      icons += `<span class="picto-icon" style="animation-delay:${j*0.06}s">${ds.emojis[i]}</span>`;
    }
    return `<div class="picto-row">
      <div class="picto-label">${lbl}</div>
      <div class="picto-icons">${icons}</div>
      <div class="picto-count">(${ds.values[i]})</div>
    </div>`;
  }).join('');

  let questionsHTML = ds.questions.slice(0, 3).map((q, qi) => `
    <div class="q-box">
      <div class="q-text">Q${qi+1}: ${q.q}</div>
      <div class="q-opts">
        ${q.opts.map(o => `<button class="q-opt" onclick="checkBarQ(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}',${qi+20})">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="barfb${qi+20}"></div>
    </div>
  `).join('');

  document.getElementById('mainCard').innerHTML = `
    ${dsSelectorHTML(currentDS)}
    <div class="card-title">${ds.title}</div>
    <div class="card-sub">${ds.sub} — each emoji = 1 vote</div>
    <div style="background:#e0f2f1;border-radius:12px;padding:12px 16px;margin:12px 0;font-size:0.95em;color:#004d40">
      <b>🖼️ How to read a pictograph:</b> Count the emojis in each row! Each emoji stands for 1 item. More emojis = more votes!
    </div>
    <div class="picto-table">${rows}</div>
    <div class="section-title" style="color:#004d40;font-weight:bold;font-size:1.1em;margin-bottom:6px">❓ Questions:</div>
    ${questionsHTML}
  `;
}

// ============ QUIZ MODE ============
function renderQuiz() {
  const ds = datasets[quizDSIdx];
  if (quizQIdx >= ds.questions.length) {
    quizDSIdx = (quizDSIdx + 1) % datasets.length;
    quizQIdx = 0;
  }
  const q = ds.questions[quizQIdx];
  const maxVal = Math.max(...ds.values);

  // Mini bar chart for context
  let miniBars = ds.labels.map((lbl, i) => {
    const h = Math.round((ds.values[i] / maxVal) * 100);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:0.75em;font-weight:bold;color:#333">${ds.values[i]}</div>
      <div style="width:36px;height:${h}px;background:${ds.colors[i]};border-radius:6px 6px 0 0"></div>
      <div style="font-size:1.2em">${ds.emojis[i]}</div>
    </div>`;
  }).join('');

  document.getElementById('mainCard').innerHTML = `
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap">
      ${datasets.map((d,i)=>`<button class="ds-btn ${i===quizDSIdx?'active':''}" onclick="quizDSIdx=${i};quizQIdx=0;renderQuiz()">${d.title.split(' ').slice(0,2).join(' ')}</button>`).join('')}
    </div>
    <div class="card-title">${ds.title}</div>

    <!-- Mini chart -->
    <div style="display:flex;align-items:flex-end;gap:6px;height:120px;border-bottom:2px solid #ccc;border-left:2px solid #ccc;padding:0 8px 4px;margin:10px auto;width:fit-content">
      ${miniBars}
    </div>

    <div style="font-size:0.9em;color:#888;text-align:center;margin-bottom:14px">Question ${quizQIdx+1} of ${ds.questions.length}</div>

    <div class="q-box">
      <div class="q-text">${q.q}</div>
      <div class="q-opts" id="quizOpts">
        ${q.opts.map(o => `<button class="q-opt" onclick="checkQuizQ(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')">  ${o}</button>`).join('')}
      </div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="action-btn" style="background:#9C27B0" onclick="quizQIdx=0;renderQuiz()">🔄 New Quiz</button>
    </div>
  `;
}

function checkQuizQ(btn, val, ans) {
  if (quizAnswered) return;
  quizAnswered = true;
  const btns = document.querySelectorAll('#quizOpts .q-opt');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (val === ans) {
    btn.classList.add('correct');
    quizRight++; quizStreak++;
    fb.textContent = '✅ Brilliant! ' + ans + ' is right! 🌟';
    fb.style.color = '#2e7d32';
    speak('Brilliant! Correct!');
    setTimeout(() => { quizQIdx++; quizAnswered = false; renderQuiz(); }, 1800);
  } else {
    btn.classList.add('wrong');
    btns.forEach(b => { if (b.textContent.trim() === ans) b.classList.add('correct'); });
    quizWrong++; quizStreak = 0;
    fb.textContent = '❌ Not quite! The answer is: ' + ans;
    fb.style.color = '#c62828';
    setTimeout(() => { quizQIdx++; quizAnswered = false; renderQuiz(); }, 2200);
  }
  document.getElementById('sRight').textContent = quizRight;
  document.getElementById('sWrong').textContent = quizWrong;
  document.getElementById('sStreak').textContent = quizStreak;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85; u.pitch = 1.2;
  window.speechSynthesis.speak(u);
}

render();
</script>

<script>
(function(){
  var allFontLinks={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  // Pre-load all font previews
  Object.values(allFontLinks).forEach(function(href){
    var existing=document.querySelector('link[href="'+href+'"]');
    if(!existing){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}
  });
  // Highlight current font
  var current=localStorage.getItem('dhanu-font')||'Nunito';
  var btns=document.querySelectorAll('#font-panel button[data-font]');
  btns.forEach(function(b){
    if(b.getAttribute('data-font')===current){
      b.style.borderColor='#667eea';b.style.background='#f0f0ff';b.style.boxShadow='0 0 0 3px rgba(102,126,234,.2)';
    }
  });
})();
function setFont(name){
  localStorage.setItem('dhanu-font',name);
  location.reload();
}
</script>
