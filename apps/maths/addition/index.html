<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var fonts={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  var chosen=localStorage.getItem('dhanu-font')||'Nunito';
  if(fonts[chosen]){
    var l=document.createElement('link');
    l.rel='stylesheet';l.href=fonts[chosen];
    document.head.appendChild(l);
  }
  document.documentElement.style.setProperty('--app-font',chosen);
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addition & Subtraction within 20</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--app-font,'Nunito'),sans-serif;background:linear-gradient(135deg,#f7971e,#ffd200);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  .topbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(0,0,0,0.2);color:white;}
  .topbar a{color:white;text-decoration:none;background:rgba(255,255,255,0.25);padding:6px 14px;border-radius:20px;}
  .tabs{display:flex;gap:8px;padding:12px 20px;justify-content:center;}
  .tab{padding:10px 28px;border-radius:50px;border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.2);color:white;font-family:inherit;font-size:1em;cursor:pointer;transition:all 0.2s;font-weight:bold;}
  .tab.active{background:white;color:#e65100;}
  .tab:hover{background:rgba(255,255,255,0.4);}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;width:100%;gap:14px;}

  /* SCORE */
  .score-row{display:flex;gap:20px;color:white;font-size:1.1em;justify-content:center;flex-wrap:wrap;}
  .score-box{background:rgba(255,255,255,0.25);border-radius:16px;padding:8px 20px;text-align:center;}
  .score-box .val{font-size:1.6em;font-weight:bold;display:block;}

  /* CARD */
  .card{width:720px;max-width:100%;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.2);padding:28px 32px;}

  /* VISUAL COUNTERS */
  .visual-area{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin:16px 0;min-height:100px;}
  .counter-group{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:220px;}
  .counter{font-size:2.2em;transition:all 0.3s;animation:popIn 0.3s ease both;}
  @keyframes popIn{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .counter.removed{filter:grayscale(1);opacity:0.25;}
  .op-symbol{font-size:3em;font-weight:bold;color:#e65100;}
  .eq-symbol{font-size:3em;font-weight:bold;color:#2e7d32;}

  /* EQUATION DISPLAY */
  .eq-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0;}
  .eq-num{font-size:3.5em;font-weight:bold;color:#333;min-width:50px;text-align:center;}
  .eq-op{font-size:3em;font-weight:bold;}
  .eq-op.plus{color:#1565c0;}
  .eq-op.minus{color:#c62828;}
  .eq-eq{font-size:3em;font-weight:bold;color:#2e7d32;}
  .answer-box{
    width:90px;height:70px;
    border:4px solid #ddd;border-radius:16px;
    font-size:2.5em;font-weight:bold;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:all 0.2s;
    background:#f9f9f9;
  }
  .answer-box:focus{outline:none;border-color:#f7971e;background:#fff9e6;}
  .answer-box.correct{border-color:#2e7d32;background:#c8f7c5;animation:celebrate 0.5s ease;}
  .answer-box.wrong{border-color:#c62828;background:#ffcdd2;animation:shake 0.4s ease;}
  @keyframes celebrate{0%,100%{transform:scale(1);}50%{transform:scale(1.2) rotate(5deg);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  /* NUMBER PAD */
  .numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:380px;margin:16px auto 0;}
  .np-btn{background:#f5f5f5;border:2px solid #ddd;border-radius:14px;padding:12px;font-size:1.4em;font-weight:bold;font-family:inherit;cursor:pointer;color:#333;transition:all 0.15s;}
  .np-btn:hover{background:#fff3e0;border-color:#f7971e;transform:scale(1.08);}
  .np-btn.del{background:#ffcdd2;border-color:#ef9a9a;color:#c62828;}
  .np-btn.check{background:#c8f7c5;border-color:#a5d6a7;color:#1b5e20;grid-column:span 2;}

  .feedback{font-size:1.3em;font-weight:bold;text-align:center;min-height:36px;margin-top:8px;}
  .hint-btn{border:none;background:#fff3e0;border-radius:50px;padding:8px 18px;font-size:0.9em;font-family:inherit;cursor:pointer;color:#e65100;margin-top:8px;}

  .nav{display:flex;justify-content:center;align-items:center;gap:14px;padding:14px;}
  .nav-btn{border:none;border-radius:50px;padding:12px 28px;font-size:1.1em;font-family:inherit;cursor:pointer;color:white;transition:transform 0.15s;}
  .nav-btn:hover{transform:scale(1.05);}
  .nav-btn:disabled{background:#ccc!important;cursor:not-allowed;transform:none;}
  .nav-btn.prev{background:#FF7043;}
  .nav-btn.next{background:#4CAF50;}
  .nav-btn.new{background:#9C27B0;}
</style>
</head>
<body>
<div class="topbar">
  <a href="../../../index.html">🏠 Home</a>
  <span style="color:white;font-size:1.1em;font-weight:bold">➕➖ Addition & Subtraction within 20</span>
  <span style="color:white;font-size:0.9em">Maths</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="setMode('add',this)">➕ Addition</button>
  <button class="tab" onclick="setMode('sub',this)">➖ Subtraction</button>
  <button class="tab" onclick="setMode('mix',this)">🔀 Mixed</button>
</div>
<div class="main">
  <div class="score-row">
    <div class="score-box"><span class="val" id="scoreRight">0</span>✅ Correct</div>
    <div class="score-box"><span class="val" id="scoreWrong">0</span>❌ Wrong</div>
    <div class="score-box"><span class="val" id="scoreStreak">0</span>🔥 Streak</div>
  </div>

  <div class="card">
    <!-- VISUAL -->
    <div style="font-size:0.95em;color:#888;text-align:center;margin-bottom:4px">Count the objects to help you!</div>
    <div class="visual-area" id="visualArea"></div>

    <!-- EQUATION -->
    <div class="eq-row">
      <div class="eq-num" id="eqA">5</div>
      <div class="eq-op" id="eqOp">+</div>
      <div class="eq-num" id="eqB">3</div>
      <div class="eq-eq">=</div>
      <div class="answer-box" id="answerBox" tabindex="0">?</div>
    </div>

    <div class="feedback" id="feedback"></div>
    <div style="text-align:center">
      <button class="hint-btn" onclick="showHint()">💡 Show Hint</button>
    </div>

    <!-- NUMPAD -->
    <div class="numpad" id="numpad"></div>
  </div>

  <div class="nav">
    <button class="nav-btn new" onclick="newQuestion()">🔄 New Question</button>
    <button class="nav-btn next" id="nextBtn" onclick="newQuestion()" disabled>Next ▶</button>
  </div>
</div>

<script>
let mode='add', curA=0, curB=0, curAns='', correct=0, wrong=0, streak=0, answered=false;

const emojis=['🍎','🌟','🐶','🎈','🌸','🦋','⭐','🍊','🐸','🐱','🎯','🍓'];

function setMode(m, tab){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  newQuestion();
}

function newQuestion(){
  answered=false;
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('feedback').textContent='';
  curAns='';
  document.getElementById('answerBox').textContent='?';
  document.getElementById('answerBox').className='answer-box';

  let a,b,op;
  if(mode==='add'){
    a=Math.floor(Math.random()*10)+1;
    b=Math.floor(Math.random()*(20-a))+1;
    if(a+b>20) b=20-a;
    op='+';
  } else if(mode==='sub'){
    a=Math.floor(Math.random()*15)+5;
    b=Math.floor(Math.random()*a)+1;
    op='-';
  } else {
    op=Math.random()>0.5?'+':'-';
    if(op==='+'){a=Math.floor(Math.random()*10)+1;b=Math.floor(Math.random()*(20-a))+1;if(a+b>20)b=20-a;}
    else{a=Math.floor(Math.random()*15)+5;b=Math.floor(Math.random()*a)+1;}
  }
  curA=a;curB=b;

  document.getElementById('eqA').textContent=a;
  document.getElementById('eqB').textContent=b;
  const opEl=document.getElementById('eqOp');
  opEl.textContent=op;
  opEl.className='eq-op '+(op==='+'?'plus':'minus');

  // Visual
  const va=document.getElementById('visualArea');
  const emoji=emojis[Math.floor(Math.random()*emojis.length)];
  va.innerHTML='';
  if(op==='+'){
    const g1=document.createElement('div');g1.className='counter-group';
    for(let i=0;i<a;i++){const s=document.createElement('span');s.className='counter';s.textContent=emoji;s.style.animationDelay=i*0.05+'s';g1.appendChild(s);}
    const sym=document.createElement('span');sym.className='op-symbol';sym.textContent='➕';
    const g2=document.createElement('div');g2.className='counter-group';
    for(let i=0;i<b;i++){const s=document.createElement('span');s.className='counter';s.textContent=emoji;s.style.animationDelay=(a+i)*0.05+'s';g2.appendChild(s);}
    va.appendChild(g1);va.appendChild(sym);va.appendChild(g2);
  } else {
    const g1=document.createElement('div');g1.className='counter-group';
    for(let i=0;i<a;i++){
      const s=document.createElement('span');s.className='counter';s.textContent=emoji;
      s.style.animationDelay=i*0.05+'s';
      if(i>=a-b)s.classList.add('removed');
      g1.appendChild(s);
    }
    const sym=document.createElement('span');sym.className='op-symbol';sym.textContent='➖';sym.style.color='#c62828';
    const g2=document.createElement('div');g2.className='counter-group';
    for(let i=0;i<b;i++){const s=document.createElement('span');s.className='counter removed';s.textContent='❌';g2.appendChild(s);}
    va.appendChild(g1);va.appendChild(sym);va.appendChild(g2);
  }
}

// Build numpad
const np=document.getElementById('numpad');
for(let i=1;i<=20;i++){
  const btn=document.createElement('button');
  btn.className='np-btn';btn.textContent=i;
  btn.onclick=()=>submitAnswer(i);
  np.appendChild(btn);
}

function submitAnswer(val){
  if(answered)return;
  answered=true;
  const op=document.getElementById('eqOp').textContent;
  const correctAns=op==='+'?curA+curB:curA-curB;
  const box=document.getElementById('answerBox');
  box.textContent=val;
  const fb=document.getElementById('feedback');
  if(val===correctAns){
    box.classList.add('correct');
    correct++;streak++;
    fb.textContent='✅ Brilliant! '+correctAns+' is right! 🌟';
    fb.style.color='#2e7d32';
    speak('Brilliant! The answer is '+correctAns);
  } else {
    box.classList.add('wrong');
    wrong++;streak=0;
    fb.textContent='❌ Not quite! The answer is '+correctAns;
    fb.style.color='#c62828';
    speak('Not quite. The answer is '+correctAns);
  }
  document.getElementById('scoreRight').textContent=correct;
  document.getElementById('scoreWrong').textContent=wrong;
  document.getElementById('scoreStreak').textContent=streak;
  document.getElementById('nextBtn').disabled=false;
}

function showHint(){
  const op=document.getElementById('eqOp').textContent;
  const ans=op==='+'?curA+curB:curA-curB;
  const fb=document.getElementById('feedback');
  if(op==='+') fb.textContent=`💡 Count all the objects together! There are ${ans} total.`;
  else fb.textContent=`💡 Start with ${curA} and take away ${curB}. You have ${ans} left!`;
  fb.style.color='#e65100';
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate=0.85;u.pitch=1.2;
  window.speechSynthesis.speak(u);
}

newQuestion();
</script>
<!-- Font Picker Widget -->
<div id="font-fab" onclick="document.getElementById('font-panel').classList.toggle('open')" title="Change Font" style="position:fixed;bottom:24px;right:24px;z-index:9999;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,0.5);transition:transform .2s;user-select:none;" onmouseenter="this.style.transform='scale(1.1)'" onmouseleave="this.style.transform='scale(1)'">Aa</div>
<div id="font-panel" style="position:fixed;bottom:88px;right:24px;z-index:9998;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);padding:20px;width:240px;display:none;flex-direction:column;gap:10px;" class="">
  <div style="font-size:13px;font-weight:700;color:#666;margin-bottom:4px;letter-spacing:.5px;">CHOOSE FONT</div>
  <button onclick="setFont('Nunito')" data-font="Nunito" style="font-family:'Nunito',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:700;transition:all .15s;">Nunito — Hello World!</button>
  <button onclick="setFont('Fredoka One')" data-font="Fredoka One" style="font-family:'Fredoka One',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:400;transition:all .15s;">Fredoka — Hello World!</button>
  <button onclick="setFont('Patrick Hand')" data-font="Patrick Hand" style="font-family:'Patrick Hand',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;transition:all .15s;">Patrick Hand — Hello!</button>
  <button onclick="setFont('ABeeZee')" data-font="ABeeZee" style="font-family:'ABeeZee',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;transition:all .15s;">ABeeZee — Hello World!</button>
  <button onclick="setFont('Poppins')" data-font="Poppins" style="font-family:'Poppins',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:600;transition:all .15s;">Poppins — Hello World!</button>
</div>
<style>
#font-panel.open{display:flex!important;}
body,button,input,select,textarea,h1,h2,h3,h4,h5,h6,p,span,div,a,label{font-family:var(--app-font,'Nunito'),sans-serif!important;}
#font-panel button:hover,#font-panel button:active{border-color:#667eea!important;background:#f0f0ff!important;transform:scale(1.02);}
</style>
<script>
(function(){
  var allFontLinks={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  // Pre-load all font previews
  Object.values(allFontLinks).forEach(function(href){
    var existing=document.querySelector('link[href="'+href+'"]');
    if(!existing){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}
  });
  // Highlight current font
  var current=localStorage.getItem('dhanu-font')||'Nunito';
  var btns=document.querySelectorAll('#font-panel button[data-font]');
  btns.forEach(function(b){
    if(b.getAttribute('data-font')===current){
      b.style.borderColor='#667eea';b.style.background='#f0f0ff';b.style.boxShadow='0 0 0 3px rgba(102,126,234,.2)';
    }
  });
})();
function setFont(name){
  localStorage.setItem('dhanu-font',name);
  location.reload();
}
</script>
<!-- End Font Picker Widget -->
<script src="/tts.js"></script>
</body>
</html>
