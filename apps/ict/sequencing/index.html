<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){
  var fonts={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  var chosen=localStorage.getItem('dhanu-font')||'Nunito';
  if(fonts[chosen]){
    var l=document.createElement('link');
    l.rel='stylesheet';l.href=fonts[chosen];
    document.head.appendChild(l);
  }
  document.documentElement.style.setProperty('--app-font',chosen);
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequencing – Order the Steps</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--app-font,'Nunito'),sans-serif;background:linear-gradient(135deg,#006064,#00838f,#0097a7);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  .topbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(0,0,0,0.25);color:white;}
  .topbar a{color:white;text-decoration:none;background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;}
  .tabs{display:flex;gap:8px;padding:12px 20px;justify-content:center;flex-wrap:wrap;}
  .tab{padding:9px 20px;border-radius:50px;border:2px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.12);color:white;font-family:inherit;font-size:0.9em;cursor:pointer;transition:all 0.2s;}
  .tab.active{background:white;color:#006064;font-weight:bold;}
  .tab:hover{background:rgba(255,255,255,0.3);}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;width:100%;gap:14px;}
  .score-row{display:flex;gap:16px;color:white;font-size:1em;justify-content:center;}
  .sc-box{background:rgba(255,255,255,0.2);border-radius:14px;padding:8px 20px;text-align:center;}
  .sc-box .val{font-size:1.5em;font-weight:bold;display:block;}
  .card{width:780px;max-width:100%;background:white;border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.35);padding:24px 28px;}

  /* LEARN – WHAT IS SEQUENCING */
  .concept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:16px 0;}
  .concept-card{border-radius:18px;padding:18px;text-align:center;cursor:pointer;transition:all 0.2s;border:2px solid transparent;}
  .concept-card:hover{transform:translateY(-3px);}
  .cc-icon{font-size:2.5em;margin-bottom:8px;}
  .cc-title{font-size:1em;font-weight:bold;margin-bottom:4px;}
  .cc-desc{font-size:0.85em;line-height:1.4;}

  /* SEQUENCE CARDS */
  .seq-title{font-size:1.1em;font-weight:bold;color:#006064;margin-bottom:14px;text-align:center;}
  .shuffled-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:14px;background:#e0f7fa;border-radius:16px;min-height:90px;margin:10px 0;}
  .order-area{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:14px;background:#f5f5f5;border-radius:16px;min-height:90px;margin:10px 0;border:3px dashed #b2ebf2;}
  .step-card{background:white;border:2px solid #80deea;border-radius:14px;padding:10px 14px;cursor:pointer;text-align:center;transition:all 0.2s;display:flex;align-items:center;gap:10px;max-width:200px;}
  .step-card:hover{border-color:#006064;background:#e0f7fa;transform:scale(1.03);}
  .step-card.selected{border-color:#f57f17;background:#fff3e0;}
  .step-card.placed{border-color:#4caf50;background:#c8f7c5;cursor:default;}
  .step-card.wrong-pos{animation:shake 0.4s;border-color:#e53935;background:#ffcdd2;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .step-num{width:28px;height:28px;border-radius:50%;background:#006064;color:white;font-weight:bold;font-size:0.9em;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-emoji{font-size:1.8em;flex-shrink:0;}
  .step-text{font-size:0.85em;color:#333;text-align:left;}

  /* DROP SLOTS */
  .slot-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px 0;}
  .drop-slot{width:160px;min-height:80px;border:3px dashed #80deea;border-radius:14px;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
  .drop-slot:hover{border-color:#006064;background:#e0f7fa;}
  .drop-slot.filled{border-color:#4caf50;border-style:solid;background:#e8f5e9;}
  .drop-slot.wrong-slot{border-color:#e53935;animation:shake 0.4s;}
  .slot-num{font-size:0.8em;color:#888;margin-bottom:4px;}

  /* ROBOT STEPS */
  .robot-area{display:flex;flex-direction:column;align-items:center;gap:10px;margin:16px 0;}
  .robot-step{display:flex;align-items:center;gap:12px;background:#e0f7fa;border-radius:14px;padding:12px 18px;width:100%;max-width:500px;border:2px solid #80deea;cursor:pointer;transition:all 0.2s;}
  .robot-step.active{background:#006064;color:white;border-color:#006064;}
  .robot-step.done{background:#c8f7c5;border-color:#4caf50;}
  .robot-icon{font-size:2em;}
  .robot-text{font-size:1em;font-weight:bold;}
  .step-arrow{font-size:1.5em;color:#80deea;}

  .feedback{font-size:1.2em;font-weight:bold;text-align:center;min-height:36px;margin-top:10px;}
  .btn-row{display:flex;gap:10px;justify-content:center;margin-top:14px;}
  .action-btn{border:none;border-radius:50px;padding:11px 24px;font-size:1em;font-family:inherit;cursor:pointer;color:white;transition:transform 0.15s;}
  .action-btn:hover{transform:scale(1.05);}

  /* STORY SEQ */
  .story-sel{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;}
  .story-btn{padding:7px 16px;border-radius:50px;border:2px solid #80deea;background:white;font-family:inherit;font-size:0.9em;cursor:pointer;color:#006064;transition:all 0.2s;}
  .story-btn.active{background:#006064;color:white;border-color:#006064;}
</style>
</head>
<body>
<div class="topbar">
  <a href="../../../../index.html">🏠 Home</a>
  <span style="color:white;font-size:1.1em;font-weight:bold">🎯 Sequencing – Order the Steps</span>
  <span style="color:white;font-size:0.9em">ICT</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="setMode('learn',this)">📖 What is Sequencing?</button>
  <button class="tab" onclick="setMode('daily',this)">🌅 Daily Routines</button>
  <button class="tab" onclick="setMode('story',this)">📖 Story Order</button>
  <button class="tab" onclick="setMode('robot',this)">🤖 Robot Instructions</button>
</div>
<div class="main">
  <div class="score-row" id="scoreRow" style="display:none">
    <div class="sc-box"><span class="val" id="sRight">0</span>✅</div>
    <div class="sc-box"><span class="val" id="sWrong">0</span>❌</div>
    <div class="sc-box"><span class="val" id="sStreak">0</span>🔥</div>
  </div>
  <div class="card" id="mainCard"></div>
</div>

<script>
const concepts = [
  {icon:'🔢', title:'What is a Sequence?', color:'#006064', bg:'#e0f7fa',
   desc:'A sequence is steps in the RIGHT ORDER. Like a recipe — you must follow steps one by one!'},
  {icon:'🤖', title:'Why Computers Need Sequences', color:'#1565c0', bg:'#e3f2fd',
   desc:'Computers follow instructions EXACTLY. If steps are in the wrong order, nothing works!'},
  {icon:'🎯', title:'First, Next, Then, Last', color:'#e65100', bg:'#fff3e0',
   desc:'We use these words to describe sequences: FIRST we do this, NEXT we do that, THEN this, LAST this!'},
  {icon:'🍪', title:'Real Life Sequences', color:'#2e7d32', bg:'#e8f5e9',
   desc:'Making a sandwich, brushing teeth, getting dressed — everyday tasks are all sequences!'},
];

const dailyRoutines = [
  {title:'🌅 Getting Ready for School', steps:[
    {emoji:'⏰', text:'Wake up when the alarm rings'},
    {emoji:'🚿', text:'Have a shower or wash face'},
    {emoji:'👕', text:'Put on school uniform'},
    {emoji:'🥣', text:'Eat breakfast'},
    {emoji:'🎒', text:'Pack school bag'},
    {emoji:'🚌', text:'Go to school'},
  ]},
  {title:'🛁 Bedtime Routine', steps:[
    {emoji:'🍽️', text:'Eat dinner'},
    {emoji:'🛁', text:'Have a bath'},
    {emoji:'👚', text:'Put on pyjamas'},
    {emoji:'🪥', text:'Brush teeth'},
    {emoji:'📚', text:'Read a bedtime story'},
    {emoji:'💤', text:'Go to sleep'},
  ]},
  {title:'🧁 Making a Sandwich', steps:[
    {emoji:'🍞', text:'Get two slices of bread'},
    {emoji:'🧈', text:'Spread butter on one slice'},
    {emoji:'🥗', text:'Add your filling (cheese, ham...)'},
    {emoji:'🍞', text:'Place second slice on top'},
    {emoji:'🔪', text:'Cut the sandwich in half'},
    {emoji:'😋', text:'Eat and enjoy!'},
  ]},
  {title:'🌱 Planting a Seed', steps:[
    {emoji:'🪣', text:'Fill a pot with soil'},
    {emoji:'✏️', text:'Make a small hole with your finger'},
    {emoji:'🫘', text:'Drop the seed into the hole'},
    {emoji:'🌍', text:'Cover the seed with soil'},
    {emoji:'💧', text:'Water the soil gently'},
    {emoji:'☀️', text:'Put the pot in a sunny spot'},
  ]},
];

const storySequences = [
  {title:'🐛 The Caterpillar', steps:[
    {emoji:'🥚', text:'An egg hatches on a leaf'},
    {emoji:'🐛', text:'A tiny caterpillar crawls out'},
    {emoji:'🍃', text:'The caterpillar eats lots of leaves'},
    {emoji:'🫛', text:'It wraps itself in a chrysalis'},
    {emoji:'🦋', text:'A beautiful butterfly emerges!'},
  ]},
  {title:'👦 Jack and the Beanstalk', steps:[
    {emoji:'🐄', text:'Jack sells his cow for magic beans'},
    {emoji:'🫘', text:'The beans grow into a giant beanstalk'},
    {emoji:'☁️', text:'Jack climbs up to a giant\'s castle'},
    {emoji:'🥚', text:'Jack steals the golden goose'},
    {emoji:'🏠', text:'Jack chops down the beanstalk'},
  ]},
  {title:'🐣 The Three Little Pigs', steps:[
    {emoji:'🏠', text:'First pig builds a straw house'},
    {emoji:'🪵', text:'Second pig builds a stick house'},
    {emoji:'🧱', text:'Third pig builds a brick house'},
    {emoji:'💨', text:'Big Bad Wolf blows down straw and stick houses'},
    {emoji:'🐷', text:'All pigs shelter in the brick house and are safe!'},
  ]},
];

const robotTasks = [
  {title:'🤖 Robot Makes Toast', emoji:'🍞',
   steps:[
    {emoji:'🔌', text:'Turn on the toaster', correct:0},
    {emoji:'🍞', text:'Put bread in the toaster', correct:1},
    {emoji:'⬇️', text:'Push down the lever', correct:2},
    {emoji:'⏱️', text:'Wait for the toast to pop up', correct:3},
    {emoji:'🧈', text:'Spread butter on the toast', correct:4},
    {emoji:'🍽️', text:'Put on a plate and eat!', correct:5},
  ]},
  {title:'🤖 Robot Draws a Circle', emoji:'✏️',
   steps:[
    {emoji:'📄', text:'Pick up a piece of paper', correct:0},
    {emoji:'✏️', text:'Pick up a pencil', correct:1},
    {emoji:'📐', text:'Place pencil on the paper', correct:2},
    {emoji:'🔄', text:'Move pencil in a round shape', correct:3},
    {emoji:'✅', text:'Lift pencil when back at the start', correct:4},
  ]},
  {title:'🤖 Robot Waters a Plant', emoji:'🪴',
   steps:[
    {emoji:'🪣', text:'Find the watering can', correct:0},
    {emoji:'🚰', text:'Fill it with water', correct:1},
    {emoji:'🪴', text:'Walk to the plant', correct:2},
    {emoji:'💧', text:'Pour water onto the soil', correct:3},
    {emoji:'🪣', text:'Put the watering can away', correct:4},
  ]},
];

let mode = 'learn';
let dailyIdx = 0, storyIdx = 0, robotIdx = 0;
let dailyShuffled = [], dailyPlaced = [];
let storyShuffled = [], storyPlaced = [];
let robotShuffled = [], robotPlaced = [];
let selectedCard = null;
let right = 0, wrong = 0, streak = 0;

function setMode(m, tab) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('scoreRow').style.display = (m==='daily'||m==='story'||m==='robot') ? 'flex' : 'none';
  render();
}

function render() {
  if (mode==='learn') renderLearn();
  else if (mode==='daily') renderDaily();
  else if (mode==='story') renderStory();
  else renderRobot();
}

function renderLearn() {
  document.getElementById('mainCard').innerHTML = `
    <div style="font-size:1.2em;font-weight:bold;color:#006064;margin-bottom:16px;text-align:center">🎯 What is Sequencing?</div>
    <div style="font-size:0.95em;color:#888;text-align:center;margin-bottom:16px">Sequencing means putting things in the <b>right order</b>. Computers follow sequences called <b>algorithms</b>!</div>
    <div class="concept-grid">
      ${concepts.map(c=>`<div class="concept-card" style="background:${c.bg};border-color:${c.color}" onclick="speak('${c.title}. ${c.desc}')">
        <div class="cc-icon">${c.icon}</div>
        <div class="cc-title" style="color:${c.color}">${c.title}</div>
        <div class="cc-desc">${c.desc}</div>
      </div>`).join('')}
    </div>
    <div style="background:#e0f7fa;border-radius:14px;padding:14px;margin-top:12px;font-size:0.95em;color:#006064;text-align:center">
      <b>🔑 Key Words:</b> Algorithm • Sequence • Instructions • Order • First • Next • Then • Last
    </div>
    <div class="btn-row">
      <button class="action-btn" style="background:#006064" onclick="speak('Sequencing means putting steps in the right order. Computers follow sequences called algorithms.')">🔊 Read</button>
    </div>
  `;
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function initDaily() {
  const routine = dailyRoutines[dailyIdx];
  dailyShuffled = shuffle(routine.steps.map((_,i)=>i));
  dailyPlaced = new Array(routine.steps.length).fill(null);
  selectedCard = null;
}

function renderDaily() {
  const routine = dailyRoutines[dailyIdx];
  if (!dailyShuffled.length) initDaily();

  const unplaced = dailyShuffled.filter(i => !dailyPlaced.includes(i));
  const shuffledHTML = unplaced.map(i => {
    const s = routine.steps[i];
    return `<div class="step-card ${selectedCard===i?'selected':''}" onclick="selectDailyCard(${i})">
      <div class="step-emoji">${s.emoji}</div>
      <div class="step-text">${s.text}</div>
    </div>`;
  }).join('');

  const slotsHTML = routine.steps.map((s,si) => {
    const placed = dailyPlaced[si];
    if (placed !== null) {
      const ps = routine.steps[placed];
      return `<div class="drop-slot filled">
        <div style="font-size:1.6em">${ps.emoji}</div>
        <div style="font-size:0.75em;color:#333;text-align:center;padding:0 4px">${ps.text}</div>
      </div>`;
    }
    return `<div class="drop-slot" onclick="placeInSlot(${si})">
      <div class="slot-num">Step ${si+1}</div>
      <div style="font-size:1.3em;color:#bbb">${si===0?'First':si===routine.steps.length-1?'Last':'Step '+(si+1)}</div>
    </div>`;
  }).join('');

  const allDone = dailyPlaced.every(p => p !== null);
  const correct = allDone && dailyPlaced.every((p,i) => p===i);

  document.getElementById('mainCard').innerHTML = `
    <div class="story-sel">
      ${dailyRoutines.map((r,i)=>`<button class="story-btn ${i===dailyIdx?'active':''}" onclick="dailyIdx=${i};initDaily();renderDaily()">${r.title}</button>`).join('')}
    </div>
    <div class="seq-title">${routine.title} – Put the steps in order!</div>
    <div style="font-size:0.9em;color:#888;margin-bottom:8px;text-align:center">Tap a step card, then tap the slot where it belongs!</div>
    <div style="font-size:0.9em;font-weight:bold;color:#006064;margin-bottom:6px">📦 Steps to order:</div>
    <div class="shuffled-area">${shuffledHTML || '<span style="color:#aaa">All placed!</span>'}</div>
    <div style="font-size:0.9em;font-weight:bold;color:#006064;margin-bottom:6px">📍 Drop here in order:</div>
    <div class="slot-row">${slotsHTML}</div>
    ${allDone ? `<div class="feedback" style="color:${correct?'#2e7d32':'#c62828'}">${correct?'🎉 Perfect sequence! Well done! 🌟':'❌ Some steps are wrong. Try again!'}</div>` : ''}
    <div class="btn-row">
      <button class="action-btn" style="background:#9C27B0" onclick="initDaily();renderDaily()">🔄 Shuffle Again</button>
      <button class="action-btn" style="background:#006064" onclick="speak('${routine.title}. ${routine.steps.map((s,i)=>'Step '+(i+1)+': '+s.text).join('. ')}')">🔊 Read Steps</button>
    </div>
  `;
}

function selectDailyCard(idx) {
  selectedCard = (selectedCard === idx) ? null : idx;
  renderDaily();
}

function placeInSlot(slotIdx) {
  if (selectedCard === null) return;
  const routine = dailyRoutines[dailyIdx];
  // check if correct
  if (selectedCard === slotIdx) {
    dailyPlaced[slotIdx] = selectedCard;
    right++; streak++;
    speak('Correct!');
  } else {
    wrong++; streak = 0;
    speak('Not quite! Try a different slot.');
  }
  selectedCard = null;
  document.getElementById('sRight').textContent = right;
  document.getElementById('sWrong').textContent = wrong;
  document.getElementById('sStreak').textContent = streak;
  renderDaily();
}

function initStory() {
  const story = storySequences[storyIdx];
  storyShuffled = shuffle(story.steps.map((_,i)=>i));
  storyPlaced = new Array(story.steps.length).fill(null);
  selectedCard = null;
}

function renderStory() {
  const story = storySequences[storyIdx];
  if (!storyShuffled.length) initStory();

  const unplaced = storyShuffled.filter(i => !storyPlaced.includes(i));
  const shuffledHTML = unplaced.map(i => {
    const s = story.steps[i];
    return `<div class="step-card ${selectedCard===i?'selected':''}" onclick="selectStoryCard(${i})">
      <div class="step-emoji">${s.emoji}</div>
      <div class="step-text">${s.text}</div>
    </div>`;
  }).join('');

  const slotsHTML = story.steps.map((s,si) => {
    const placed = storyPlaced[si];
    if (placed !== null) {
      const ps = story.steps[placed];
      return `<div class="drop-slot filled">
        <div style="font-size:1.6em">${ps.emoji}</div>
        <div style="font-size:0.75em;color:#333;text-align:center;padding:0 4px">${ps.text}</div>
      </div>`;
    }
    return `<div class="drop-slot" onclick="placeInStorySlot(${si})">
      <div class="slot-num">Step ${si+1}</div>
    </div>`;
  }).join('');

  const allDone = storyPlaced.every(p => p !== null);
  const correct = allDone && storyPlaced.every((p,i) => p===i);

  document.getElementById('mainCard').innerHTML = `
    <div class="story-sel">
      ${storySequences.map((s,i)=>`<button class="story-btn ${i===storyIdx?'active':''}" onclick="storyIdx=${i};initStory();renderStory()">${s.title}</button>`).join('')}
    </div>
    <div class="seq-title">${story.title} – What happened first, next, then, last?</div>
    <div style="font-size:0.9em;color:#888;margin-bottom:8px;text-align:center">Tap a story card, then tap where it goes in the story!</div>
    <div class="shuffled-area">${shuffledHTML || '<span style="color:#aaa">All placed!</span>'}</div>
    <div class="slot-row">${slotsHTML}</div>
    ${allDone ? `<div class="feedback" style="color:${correct?'#2e7d32':'#c62828'}">${correct?'🎉 You told the story in the right order! 🌟':'❌ Some parts are not in order. Try again!'}</div>` : ''}
    <div class="btn-row">
      <button class="action-btn" style="background:#9C27B0" onclick="initStory();renderStory()">🔄 Shuffle</button>
    </div>
  `;
}

function selectStoryCard(idx) { selectedCard=(selectedCard===idx)?null:idx; renderStory(); }
function placeInStorySlot(si) {
  if (selectedCard===null) return;
  if (selectedCard===si) { storyPlaced[si]=selectedCard; right++; streak++; speak('Correct!'); }
  else { wrong++; streak=0; speak('Try another spot!'); }
  selectedCard=null;
  document.getElementById('sRight').textContent=right;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sStreak').textContent=streak;
  renderStory();
}

function initRobot() {
  const task = robotTasks[robotIdx];
  robotShuffled = shuffle(task.steps.map((_,i)=>i));
  robotPlaced = [];
  selectedCard = null;
}

function renderRobot() {
  const task = robotTasks[robotIdx];
  if (!robotShuffled.length) initRobot();

  const unplaced = robotShuffled.filter(i => !robotPlaced.includes(i));
  const shuffledHTML = unplaced.map(i => {
    const s = task.steps[i];
    return `<div class="step-card ${selectedCard===i?'selected':''}" onclick="selectRobotCard(${i})">
      <div class="step-emoji">${s.emoji}</div>
      <div class="step-text">${s.text}</div>
    </div>`;
  }).join('');

  const placedHTML = robotPlaced.map((i,pi) => {
    const s = task.steps[i];
    return `<div class="robot-step done">
      <div class="step-num">${pi+1}</div>
      <div class="robot-icon">${s.emoji}</div>
      <div class="robot-text">${s.text}</div>
    </div>`;
  }).join('');

  // Next expected slot
  const nextExpected = robotPlaced.length;
  const allDone = robotPlaced.length === task.steps.length;
  const isCorrect = allDone && robotPlaced.every((p,i)=>p===i);

  document.getElementById('mainCard').innerHTML = `
    <div class="story-sel">
      ${robotTasks.map((t,i)=>`<button class="story-btn ${i===robotIdx?'active':''}" onclick="robotIdx=${i};initRobot();renderRobot()">${t.title}</button>`).join('')}
    </div>
    <div class="seq-title">${task.title} ${task.emoji}</div>
    <div style="font-size:0.9em;color:#888;margin-bottom:10px;text-align:center">Give the robot its instructions in the <b>right order</b>! Tap the FIRST step, then NEXT, and so on.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
      <div>
        <div style="font-size:0.9em;font-weight:bold;color:#006064;margin-bottom:8px">🃏 Available steps:</div>
        <div class="shuffled-area" style="flex-direction:column;align-items:stretch">
          ${shuffledHTML || '<span style="color:#aaa;text-align:center">All added!</span>'}
        </div>
      </div>
      <div>
        <div style="font-size:0.9em;font-weight:bold;color:#006064;margin-bottom:8px">🤖 Robot program:</div>
        <div class="robot-area">${placedHTML}</div>
        ${!allDone && unplaced.length ? `<div style="background:#e0f7fa;border-radius:12px;padding:10px;text-align:center;font-size:0.9em;color:#006064">👆 Tap a step on the left to add it (step ${nextExpected+1})</div>` : ''}
      </div>
    </div>
    ${allDone ? `<div class="feedback" style="color:${isCorrect?'#2e7d32':'#c62828'}">${isCorrect?'🤖 Robot program complete! 🎉 Amazing!':'❌ Wrong order! The robot is confused. Try again.'}</div>` : ''}
    <div class="btn-row">
      <button class="action-btn" style="background:#9C27B0" onclick="initRobot();renderRobot()">🔄 Reset</button>
    </div>
  `;
}

function selectRobotCard(idx) {
  const task = robotTasks[robotIdx];
  const nextExpected = robotPlaced.length;
  if (idx === nextExpected) {
    robotPlaced.push(idx);
    right++; streak++;
    speak('Step ' + (robotPlaced.length) + '. ' + task.steps[idx].text);
  } else {
    wrong++; streak=0;
    speak('Oops! That\'s not the right order. Think about what comes first!');
  }
  document.getElementById('sRight').textContent=right;
  document.getElementById('sWrong').textContent=wrong;
  document.getElementById('sStreak').textContent=streak;
  renderRobot();
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate=0.85; u.pitch=1.1;
  window.speechSynthesis.speak(u);
}

render();
</script>

  <button onclick="setFont('Poppins')" data-font="Poppins" style="font-family:'Poppins',sans-serif;padding:12px 16px;border-radius:12px;border:2px solid #e0e0e0;background:#f9f9f9;cursor:pointer;text-align:left;font-size:16px;font-weight:600;transition:all .15s;">Poppins — Hello World!</button>

body,button,input,select,textarea,h1,h2,h3,h4,h5,h6,p,span,div,a,label{font-family:var(--app-font,'Nunito'),sans-serif!important;}

</style>
<script>
(function(){
  var allFontLinks={
    'Nunito':'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
    'Fredoka One':'https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap',
    'Patrick Hand':'https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap',
    'ABeeZee':'https://fonts.googleapis.com/css2?family=ABeeZee&display=swap',
    'Poppins':'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap'
  };
  // Pre-load all font previews
  Object.values(allFontLinks).forEach(function(href){
    var existing=document.querySelector('link[href="'+href+'"]');
    if(!existing){var l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);}
  });
  // Highlight current font
  var current=localStorage.getItem('dhanu-font')||'Nunito';
  var btns=document.querySelectorAll('#font-panel button[data-font]');
  btns.forEach(function(b){
    if(b.getAttribute('data-font')===current){
      b.style.borderColor='#667eea';b.style.background='#f0f0ff';b.style.boxShadow='0 0 0 3px rgba(102,126,234,.2)';
    }
  });
})();
function setFont(name){
  localStorage.setItem('dhanu-font',name);
  location.reload();
}
</script>
